name: Fetch Conflict Events

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  fetch-events:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run LiveUAmap event fetch
        env:
          LIVEUAMAP_API_KEY: ${{ secrets.LIVEUAMAP_API_KEY }}
        run: python src/fetch_liveuamap_events.py

      - name: Score events
        run: python src/score_events.py

      - name: Commit event data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/events/
          git diff --cached --quiet || git commit -m "Update conflict event data"
          git push
